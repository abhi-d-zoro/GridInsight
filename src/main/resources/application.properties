spring.application.name=gridinsight-backend

spring.datasource.url=jdbc:mysql://localhost:3306/gridinsight?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ? IMPORTANT: Flyway baseline for existing schema
spring.flyway.baseline-on-migrate=true

# Security
security.jwt.secret=c2VjdXJlLWRldi1zZWNyZXQtYmFzZTY0LWtleS0zMmJ5dGVzLQ==

server.port=8081

logging.level.org.springframework.security=DEBUG
logging.level.com.gridinsight.backend=DEBUG
logging.level.com.gridinsight.backend.a_iam=DEBUG

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,dbSchema,diskSpace
management.health.db.enabled=true